version: '3.8'

services:
  storagemover:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storagemover
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-32-byte-key-in-prod}
      - LOG_LEVEL=info
    volumes:
      - storagemover-data:/app/data
      - storagemover-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  storagemover-data:
    driver: local
  storagemover-logs:
    driver: local
